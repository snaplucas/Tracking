spring:
  application:
    name: tracking
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8080

tracking:
  kafka:
    topic: sports.events.scores
    publish:
      send-timeout-ms: 5000
      max-attempts: 3
      backoff-ms: 500
      backoff-multiplier: 2.0
  external:
    base-url: ${EXTERNAL_API_BASE_URL:http://localhost:8080}
  polling:
    interval-ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.sports.tracking: INFO
