spring.application.name=tracking
server.port=8080

# ---------------------------------------------------------------------------
# Kafka
# ---------------------------------------------------------------------------
# Broker address. The producer (String key + JSON ScoreMessage value) is built
# explicitly in AppConfig from this property.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Topic the transformed score messages are published to.
tracking.kafka.topic=sports.events.scores

# ---------------------------------------------------------------------------
# External (mocked) scores API
# ---------------------------------------------------------------------------
# Base URL of the external scores API. Defaults to this same service, which
# exposes a mock endpoint under /mock/external for self-contained demos.
tracking.external.base-url=${EXTERNAL_API_BASE_URL:http://localhost:8080}

# How often each live event is polled, in milliseconds.
tracking.polling.interval-ms=10000

# ---------------------------------------------------------------------------
# Actuator / logging
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
logging.level.com.sports.tracking=INFO
